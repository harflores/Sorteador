<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sorteo - Iglesia Palabra y Poder</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #F5A800;
            --primary-dark: #C58800;
            --primary-light: #FFD054;
            --white: #FFFFFF;
            --bg: #FFF8E7;
            --text-dark: #3D2C00;
            --text-muted: #8A7340;
            --shadow: rgba(197, 136, 0, 0.25);
            --radius: 16px;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Montserrat', system-ui, sans-serif;
            background: var(--bg);
            color: var(--text-dark);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        header {
            width: 100%;
            background: linear-gradient(135deg, var(--primary) 0%, var(--primary-dark) 100%);
            padding: 2rem 1rem 2.5rem;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 0.75rem;
            box-shadow: 0 4px 20px var(--shadow);
        }

        .logo {
            width: 100px;
            height: 100px;
            border-radius: 50%;
            object-fit: cover;
            border: 4px solid var(--white);
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.2);
        }

        header h1 {
            color: var(--white);
            font-size: 1.6rem;
            font-weight: 900;
            text-align: center;
            letter-spacing: 2px;
            text-transform: uppercase;
            text-shadow: 0 2px 4px rgba(0, 0, 0, 0.15);
        }

        header .divider {
            width: 80px;
            height: 3px;
            background: var(--white);
            border-radius: 2px;
            opacity: 0.6;
        }

        main {
            width: 100%;
            max-width: 520px;
            padding: 2rem 1rem 3rem;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 1.5rem;
        }

        .input-group {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 0.5rem;
            width: 100%;
        }

        .input-group label {
            font-weight: 600;
            font-size: 0.95rem;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .input-group input {
            width: 160px;
            padding: 0.75rem 1rem;
            font-family: 'Montserrat', sans-serif;
            font-size: 1.25rem;
            font-weight: 700;
            text-align: center;
            border: 3px solid var(--primary);
            border-radius: var(--radius);
            outline: none;
            color: var(--text-dark);
            background: var(--white);
            transition: border-color 0.2s, box-shadow 0.2s;
        }

        .input-group input:focus {
            border-color: var(--primary-dark);
            box-shadow: 0 0 0 4px rgba(245, 168, 0, 0.2);
        }

        .btn {
            font-family: 'Montserrat', sans-serif;
            font-weight: 700;
            font-size: 1.1rem;
            letter-spacing: 1px;
            text-transform: uppercase;
            border: none;
            border-radius: var(--radius);
            cursor: pointer;
            transition: transform 0.15s, box-shadow 0.15s, background 0.2s;
        }

        .btn-primary {
            background: linear-gradient(135deg, var(--primary) 0%, var(--primary-dark) 100%);
            color: var(--white);
            padding: 1rem 2.5rem;
            box-shadow: 0 4px 15px var(--shadow);
        }

        .btn-primary:hover:not(:disabled) {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px var(--shadow);
        }

        .btn-primary:active:not(:disabled) {
            transform: translateY(0);
        }

        .btn-primary:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .btn-reset {
            background: transparent;
            color: var(--primary-dark);
            padding: 0.6rem 1.5rem;
            border: 2px solid var(--primary);
            font-size: 0.85rem;
        }

        .btn-reset:hover {
            background: var(--primary);
            color: var(--white);
        }

        .display-area {
            width: 100%;
            min-height: 180px;
            background: var(--white);
            border-radius: var(--radius);
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.06);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 2rem;
            position: relative;
            overflow: hidden;
        }

        .display-area::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 4px;
            background: linear-gradient(90deg, var(--primary), var(--primary-light), var(--primary));
        }

        .display-placeholder {
            color: var(--text-muted);
            font-size: 1rem;
            font-weight: 600;
            opacity: 0.5;
        }

        .countdown-number {
            font-size: 6rem;
            font-weight: 900;
            color: var(--primary);
            animation: countPulse 0.8s ease-out;
            line-height: 1;
        }

        .winner-number {
            font-size: 5rem;
            font-weight: 900;
            color: var(--primary);
            animation: winnerReveal 0.6s cubic-bezier(0.34, 1.56, 0.64, 1);
            line-height: 1;
        }

        .winner-label {
            font-size: 0.85rem;
            font-weight: 700;
            color: var(--primary-dark);
            text-transform: uppercase;
            letter-spacing: 3px;
            margin-bottom: 0.5rem;
            animation: fadeIn 0.4s ease;
        }

        .winner-glow {
            position: absolute;
            width: 200px;
            height: 200px;
            border-radius: 50%;
            background: radial-gradient(circle, rgba(245, 168, 0, 0.15) 0%, transparent 70%);
            animation: glowPulse 2s ease-in-out infinite;
            pointer-events: none;
        }

        .all-done {
            color: var(--primary-dark);
            font-weight: 700;
            font-size: 1rem;
            text-align: center;
        }

        .history-section {
            width: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 0.75rem;
        }

        .history-section h2 {
            font-size: 0.85rem;
            font-weight: 700;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        .history-grid {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 0.5rem;
            width: 100%;
        }

        .history-badge {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            min-width: 48px;
            height: 48px;
            padding: 0 0.6rem;
            background: linear-gradient(135deg, var(--primary) 0%, var(--primary-dark) 100%);
            color: var(--white);
            font-weight: 700;
            font-size: 1rem;
            border-radius: 12px;
            box-shadow: 0 2px 8px var(--shadow);
            animation: badgeIn 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
        }

        .remaining-info {
            font-size: 0.8rem;
            color: var(--text-muted);
            font-weight: 600;
        }

        @keyframes countPulse {
            0% {
                transform: scale(0.3);
                opacity: 0;
            }
            50% {
                opacity: 1;
            }
            100% {
                transform: scale(1);
                opacity: 1;
            }
        }

        @keyframes winnerReveal {
            0% {
                transform: scale(0);
                opacity: 0;
            }
            100% {
                transform: scale(1);
                opacity: 1;
            }
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(-10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @keyframes glowPulse {
            0%, 100% { transform: scale(1); opacity: 0.5; }
            50% { transform: scale(1.3); opacity: 1; }
        }

        @keyframes badgeIn {
            0% { transform: scale(0); }
            100% { transform: scale(1); }
        }

        @media (max-width: 480px) {
            header h1 {
                font-size: 1.2rem;
            }

            .logo {
                width: 80px;
                height: 80px;
            }

            .countdown-number {
                font-size: 4.5rem;
            }

            .winner-number {
                font-size: 3.5rem;
            }

            .display-area {
                min-height: 150px;
                padding: 1.5rem;
            }
        }
    </style>
</head>
<body>

    <header>
        <img src="image.png" alt="Logo Iglesia Palabra y Poder" class="logo">
        <h1>Iglesia Palabra y Poder</h1>
        <div class="divider"></div>
    </header>

    <main>
        <div class="input-group">
            <label for="maxNumber">Cantidad de n&uacute;meros a sortear</label>
            <input type="number" id="maxNumber" min="1" placeholder="Ej: 100" autocomplete="off">
        </div>

        <button class="btn btn-primary" id="btnDraw" disabled>Iniciar Sorteo</button>

        <div class="display-area" id="displayArea">
            <span class="display-placeholder">El n&uacute;mero ganador aparecer&aacute; aqu&iacute;</span>
        </div>

        <div class="history-section" id="historySection" style="display: none;">
            <h2>N&uacute;meros Sorteados</h2>
            <div class="history-grid" id="historyGrid"></div>
            <span class="remaining-info" id="remainingInfo"></span>
        </div>

        <button class="btn btn-reset" id="btnReset" style="display: none;">Reiniciar Sorteo</button>
    </main>

    <script>
        const maxNumberInput = document.getElementById('maxNumber');
        const btnDraw = document.getElementById('btnDraw');
        const btnReset = document.getElementById('btnReset');
        const displayArea = document.getElementById('displayArea');
        const historySection = document.getElementById('historySection');
        const historyGrid = document.getElementById('historyGrid');
        const remainingInfo = document.getElementById('remainingInfo');

        let availableNumbers = [];
        let drawnNumbers = [];
        let isDrawing = false;
        let poolInitialized = false;

        maxNumberInput.addEventListener('input', () => {
            const val = parseInt(maxNumberInput.value, 10);
            if (val > 0 && !isDrawing) {
                if (!poolInitialized || availableNumbers.length + drawnNumbers.length !== val) {
                    initPool(val);
                }
                btnDraw.disabled = false;
            } else {
                btnDraw.disabled = true;
            }
        });

        btnDraw.addEventListener('click', startDraw);
        btnReset.addEventListener('click', resetAll);

        function initPool(n) {
            availableNumbers = [];
            drawnNumbers = [];
            for (let i = 1; i <= n; i++) {
                availableNumbers.push(i);
            }
            poolInitialized = true;
            historyGrid.innerHTML = '';
            historySection.style.display = 'none';
            btnReset.style.display = 'none';
            updateRemaining();
            displayArea.innerHTML = '<span class="display-placeholder">El n\u00famero ganador aparecer\u00e1 aqu\u00ed</span>';
        }

        function startDraw() {
            if (isDrawing || availableNumbers.length === 0) return;

            isDrawing = true;
            btnDraw.disabled = true;
            maxNumberInput.disabled = true;

            let count = 3;
            displayArea.innerHTML = `<span class="countdown-number">${count}</span>`;

            const interval = setInterval(() => {
                count--;
                if (count > 0) {
                    displayArea.innerHTML = `<span class="countdown-number">${count}</span>`;
                } else {
                    clearInterval(interval);
                    pickWinner();
                }
            }, 1000);
        }

        function pickWinner() {
            const idx = Math.floor(Math.random() * availableNumbers.length);
            const winner = availableNumbers.splice(idx, 1)[0];
            drawnNumbers.push(winner);

            displayArea.innerHTML = `
                <div class="winner-glow"></div>
                <span class="winner-label">N\u00famero Ganador</span>
                <span class="winner-number">${winner}</span>
            `;

            addHistoryBadge(winner);
            updateRemaining();

            historySection.style.display = 'flex';
            btnReset.style.display = 'inline-flex';

            isDrawing = false;

            if (availableNumbers.length === 0) {
                btnDraw.disabled = true;
                remainingInfo.textContent = '\u00a1Todos los n\u00fameros han sido sorteados!';
            } else {
                btnDraw.disabled = false;
            }
        }

        function addHistoryBadge(number) {
            const badge = document.createElement('span');
            badge.className = 'history-badge';
            badge.textContent = number;
            historyGrid.appendChild(badge);
        }

        function updateRemaining() {
            const total = availableNumbers.length + drawnNumbers.length;
            if (availableNumbers.length > 0 && drawnNumbers.length > 0) {
                remainingInfo.textContent = `${availableNumbers.length} de ${total} n\u00fameros disponibles`;
            }
        }

        function resetAll() {
            const val = parseInt(maxNumberInput.value, 10);
            if (val > 0) {
                initPool(val);
            }
            maxNumberInput.disabled = false;
            btnDraw.disabled = val > 0 ? false : true;
            isDrawing = false;
            poolInitialized = val > 0;
        }
    </script>

</body>
</html>
