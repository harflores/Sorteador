<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sorteo - Iglesia Palabra y Poder</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>

    <header>
        <img src="img/image.png" alt="Logo Iglesia Palabra y Poder" class="logo">
        <h1>Iglesia Palabra y Poder</h1>
        <div class="divider"></div>
    </header>

    <main>
        <div class="input-group">
            <label for="maxNumber">Cantidad de n&uacute;meros a sortear</label>
            <input type="number" id="maxNumber" min="1" placeholder="Ej: 100" autocomplete="off">
        </div>

        <button class="btn btn-primary" id="btnDraw" disabled>Iniciar Sorteo</button>

        <div class="display-area" id="displayArea">
            <span class="display-placeholder">El n&uacute;mero ganador aparecer&aacute; aqu&iacute;</span>
        </div>

        <div class="history-section" id="historySection" style="display: none;">
            <h2>N&uacute;meros Sorteados</h2>
            <div class="history-grid" id="historyGrid"></div>
            <span class="remaining-info" id="remainingInfo"></span>
        </div>

        <button class="btn btn-reset" id="btnReset" style="display: none;">Reiniciar Sorteo</button>
    </main>

    <script src="js/app.js"></script>

</body>
</html>
